<div class="bg-slate-900 border border-slate-800 rounded-lg p-5">
  <div class="text-[10px] uppercase tracking-widest text-slate-500 mb-2">runs in db</div>
  <div class="text-3xl font-semibold text-slate-100">{{ runs_total }}</div>
</div>

<div class="bg-slate-900 border border-slate-800 rounded-lg p-5">
  <div class="text-[10px] uppercase tracking-widest text-slate-500 mb-2">judgments since latest run</div>
  <div class="text-3xl font-semibold text-slate-100">{{ judged_this_run }}</div>
  <div class="mt-1 text-[11px] text-slate-500"
       title="Estimated equivalent public-API cost for the tokens spent judging (subscription/OAuth usage is not billed per-token)">
    est. LLM cost
    <span class="font-mono text-emerald-400">${{ "%.4f"|format(cost_this_run or 0.0) }}</span>
  </div>
</div>
