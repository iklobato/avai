name: avai-landing
region: nyc

static_sites:
  - name: web
    source_dir: /landing-page
    github:
      repo: iklobato/avai
      branch: release/0.1.0
      deploy_on_push: true
    index_document: index.html
    # SPA shell: serve index.html for any unmatched path. (error_document
    # and catchall_document are mutually exclusive — catchall wins for a
    # single-page marketing site.)
    catchall_document: index.html
    routes:
      - path: /

# Custom domain is attached after the first deploy (see deploy notes):
# getavai.com's DNS zone lives at GoDaddy, not DigitalOcean, so DO can't
# manage the zone here. Instead we add the domain to the app and point a
# CNAME at the app's *.ondigitalocean.app ingress from GoDaddy.
