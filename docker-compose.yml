# avai — Docker Compose for the full stack (Linux deployment).
#
# Two services, two images (multi-stage Dockerfile):
#
#   monitor    — Linux-only. Targets the `monitor` stage which adds
#                iw, systemd CLIs (systemctl + journalctl), dmsetup,
#                bluez to the base image. Runs as root in the host's
#                PID + network namespaces. Bind-mounts the host's
#                /sys, /etc, /var/lib, /run/systemd, /var/log/journal
#                etc. under /host so the collectors (parameterised
#                via HOST_PREFIX=/host) read the host's state rather
#                than the container's. Also bind-mounts /run/systemd,
#                /run/dbus, /dev/mapper at native paths because
#                systemctl/dmsetup don't have a "look in this prefix"
#                flag — they hardcode the native locations.
#                Opt-in via `docker compose --profile linux up`.
#
#   dashboard  — Slim Flask viewer on :8765. Targets the `dashboard`
#                stage. No host-monitoring binaries. Runs non-root
#                with all caps dropped and a read-only root filesystem.
#                Always runs (default profile).
#
# IMPORTANT — macOS users: the `monitor` service will fail at
# `docker compose --profile linux up` time because Docker Desktop's
# Linux VM can't mount the macOS host's /sys, /etc, etc. Run
# host_monitor.py natively on macOS; only `dashboard` is useful in
# Docker on macOS.

services:

  monitor:
    build:
      context: .
      dockerfile: Dockerfile
      target: monitor
    image: avai-monitor:latest
    container_name: avai-monitor
    profiles: ["linux"]

    # Root + host namespaces so psutil sees host processes/sockets.
    user: "0:0"
    pid: host
    network_mode: host

    # Forward credentials from the calling shell.
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      # The collector code reads sysfs / /etc / /var paths through
      # host_path() which prepends this prefix. The bind mounts
      # below place all readable host state under /host/<original>.
      - HOST_PREFIX=/host
      # systemctl talks to host's D-Bus via the bind-mounted socket.
      - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/run/dbus/system_bus_socket

    volumes:
      # SQLite database — shared with the dashboard service.
      - ./:/data

      # ----- /host/* mirror of the host filesystem (collector code) -----
      # Everything below is read-only; the monitor never writes here.
      - /sys:/host/sys:ro
      - /etc:/host/etc:ro
      - /var/lib/bluetooth:/host/var/lib/bluetooth:ro
      - /var/lib/dpkg:/host/var/lib/dpkg:ro
      - /usr/share/applications:/host/usr/share/applications:ro
      - /usr/local/share/applications:/host/usr/local/share/applications:ro
      - /var/lib/flatpak/exports/share/applications:/host/var/lib/flatpak/exports/share/applications:ro
      - /lib/systemd:/host/lib/systemd:ro
      - /usr/lib/systemd:/host/usr/lib/systemd:ro
      - /run/systemd:/host/run/systemd:ro
      - /var/log/journal:/host/var/log/journal:ro
      - /run/log/journal:/host/run/log/journal:ro
      - /var/spool/cron:/host/var/spool/cron:ro
      - /home:/host/home:ro
      - /root:/host/root:ro

      # ----- native-path mounts (CLI tools without prefix flags) -----
      # systemctl looks for the private socket at /run/systemd/private;
      # bind-mounting host's /run/systemd here lets it query the host's
      # systemd instance instead of the container's (which doesn't run
      # systemd at all).
      - /run/systemd:/run/systemd:ro
      - /run/dbus:/run/dbus:ro
      - /etc/machine-id:/etc/machine-id:ro
      # dmsetup hits /dev/mapper/control ioctls — needs the device
      # node and the broader /dev/mapper directory.
      - /dev/mapper:/dev/mapper:ro

    # Capabilities. Root in a container has a *limited* default cap set
    # (Docker drops several); these adds restore what each collector
    # needs.
    cap_add:
      # psutil.net_connections + cross-process /proc reads
      - SYS_PTRACE
      # iw uses NL80211 netlink; some sysfs reads
      - NET_ADMIN
      - NET_RAW
      # Read files owned by other users (e.g. /etc/shadow, root-owned
      # bluetooth state) without depending on Linux DAC overrides.
      - DAC_READ_SEARCH

    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    image: avai-dashboard:latest
    container_name: avai-dashboard
    # The dashboard is useful on its own — no depends_on so it starts
    # in macOS-only mode (no `monitor` service in the default profile).
    ports:
      - "8765:8765"
    volumes:
      - ./:/data
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8765/api/notifications/new?since=2099-01-01', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 4s
      start_period: 5s
      retries: 3
